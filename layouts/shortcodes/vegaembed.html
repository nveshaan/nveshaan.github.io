<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@5"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

{{- $id := .Get "id" | default (printf "vega-%d" .Ordinal) -}}

<div id="{{ $id }}" style="width: 100%; min-height: 400px; display: block;"></div>

<script type="text/javascript">
    (function () {
        const renderChart = () => {
            const target = document.getElementById('{{ $id }}');
            if (!target) {
                // If the theme container hasn't dropped the element into the DOM yet, retry in 30ms
                setTimeout(renderChart, 30);
                return;
            }

            const spec = '{{ .Get "spec" }}';
            vegaEmbed('#{{ $id }}', spec)
                .then(function (result) {
                    console.log("Vega successfully rendered on target: {{ $id }}");
                })
                .catch(console.error);
        };

        // Execute immediately or defer safely based on parsing state
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', renderChart);
        } else {
            renderChart();
        }
    })();
</script>
